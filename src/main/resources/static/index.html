<!DOCTYPE html>
<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zain:wght@200;300;400;700;800;900&display=swap" rel="stylesheet">
    <title>Shortener by Sanju</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;

    font-family:"Zain",sans-serif;

    background:
        radial-gradient(circle at top left,#5b21b6 0%,transparent 40%),
        radial-gradient(circle at bottom right,#2563eb 0%,transparent 40%),
        #09090b;

    color:white;
}

.card{
    width:100%;
    max-width:680px;

    padding:35px 45px;

    border-radius:22px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.15);

    box-shadow:
        0 20px 60px rgba(0,0,0,.45);

    transition:.35s;
}

.card:hover{
    transform:translateY(-5px);
}

h1{
    text-align:center;
    font-size:3rem;
    font-weight:800;
    margin-bottom:25px;
}

h3{
    text-align:center;
    font-size:1.5rem;
    margin-bottom:15px;
}

input{
    width:100%;
    margin:12px 0;
    padding:15px 18px;

    border:none;
    outline:none;

    border-radius:12px;

    background:rgba(255,255,255,.08);

    color:white;

    font-size:1rem;

    transition:.25s;
}

input::placeholder{
    color:#bdbdbd;
}

input:focus{
    background:rgba(255,255,255,.12);

    border:1px solid #60a5fa;
}

button{

    width:100%;
    margin-top:10px;

    padding:15px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    color:white;

    font-size:1.1rem;
    font-weight:700;
    font-family:inherit;

    background:linear-gradient(135deg,#7c3aed,#2563eb);

    transition:.3s;
}

button:hover{
    transform:translateY(-2px);

    box-shadow:0 12px 30px rgba(37,99,235,.45);
}

.stats-btn{
    background:linear-gradient(135deg,#06b6d4,#2563eb);
}

#result,
.stats-box{
    margin-top:18px;
    border-radius:16px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    padding:18px;
    color:#fff;
    transition:.3s;
}

.stats-box:empty{
    display:none;
}

.analytics-card{
    display:flex;
    flex-direction:column;
    gap:16px;
}

.analytics-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.analytics-title{
    font-size:1.05rem;
    font-weight:700;
}

.analytics-chip{
    padding:6px 14px;
    border-radius:999px;
    background:linear-gradient(135deg,#06b6d4,#2563eb);
    font-weight:700;
}

.analytics-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.analytics-item{
    padding:16px;
    border-radius:14px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    text-align:center;
}

.analytics-label{
    color:#94a3b8;
    font-size:.85rem;
    margin-bottom:8px;
}

.analytics-value{
    font-size:1.6rem;
    font-weight:800;
}

.analytics-code{
    color:#38bdf8;
    font-family:monospace;
    font-size:1rem;
}
.analytics-table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

.analytics-table th,
.analytics-table td{
    padding:12px;
    border-bottom:1px solid rgba(255,255,255,.08);
    text-align:left;
}

.analytics-table th{
    color:#94a3b8;
    width:40%;
}

.analytics-table td{
    color:white;
}

.stats-box:empty{
    display:none;
}

hr{
    margin:30px 0;
    border:none;
    border-top:1px solid rgba(255,255,255,.08);
}
    </style>
</head>
<body>

<div class="card">
    <h1>URL Shortener</h1>
    <input type="text" id="longUrl" placeholder="Enter long URL">
    <input type="text" id="alias" placeholder="Custom Alias (optional)">
    <button onclick="shorten()">Shorten Link</button>
    <p id="result">Your result will appear here.</p>

<div style="margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,.08);">
    <h3>
         Link Analytics
    </h3>
    <input type="text" id="statsAlias" placeholder="Enter short code to check stats">
    <button onclick="getStats()" class="stats-btn">View Analytics</button>
    <div id="statsResult" class="stats-box"></div>
</div>

<script>
    async function getStats() {
        const alias = document.getElementById('statsAlias').value;
        const statsText = document.getElementById('statsResult');
        
        if (!alias) {
            statsText.innerText = "Please enter an alias first.";
            return;
        }
        statsText.innerText = "Loading...";
        const response = await fetch(`/api/${alias}/stats`);
        const data = await response.json();
        if (!response.ok) {
            statsText.innerText = `<span style="color:#f87171;">Error: Could not find that link.</span>`;
            return;
        }

    statsText.innerHTML = `
<div class="analytics-card">

    <table class="analytics-table">
        <tr>
            <th>Short Code</th>
            <td>/${alias}</td>
        </tr>

        <tr>
            <th>Total Clicks</th>
            <td>${data.clickCount}</td>
        </tr>

        <tr>
            <th>Last Clicked</th>
            <td>${data.lastClicked ?? "Never"}</td>
        </tr>
    </table>

</div>
`;
    }
</script>
</div>

<script>
    async function shorten() {
        const resultText = document.getElementById('result');
        resultText.innerText = "Processing...";
        
        const response = await fetch('/api/short', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                realUrl: document.getElementById('longUrl').value,
                customAlias: document.getElementById('alias').value
            })
        });
        
        const text = await response.text();
        resultText.innerText = response.ok ? "Shortened: " + text : "Error: " + text;
    }
</script>
</body>
</html>
